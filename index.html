<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Prenota | PDE</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0d1117;
    --navy-2:#161b22;
    --navy-3:#1c2330;
    --cyan:#00b4e8;
    --cyan-dim:#00b4e833;
    --text:#e6edf3;
    --text-dim:#8b949e;
    --border:#30363d;
    --danger:#f85149;
    --ok:#3fb950;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:var(--navy);
    color:var(--text);
    min-height:100vh;
  }
  /* ---------- LOGIN ---------- */
  #login-screen{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:24px;
  }
  .login-logo-wrap{
    background:#fff;
    border-radius:8px;
    padding:10px 18px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .login-logo-wrap img{ height:32px; display:block; }
  #login-box{
    background:var(--navy-2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:32px;
    width:320px;
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  #login-box h1{
    margin:0 0 4px 0;
    font-size:18px;
    font-weight:600;
    text-align:center;
  }
  #login-box p.subtitle{
    margin:0 0 10px 0;
    color:var(--text-dim);
    font-size:13px;
    text-align:center;
  }
  input{
    background:var(--navy-3);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
    width:100%;
  }
  input:focus{ outline:2px solid var(--cyan); outline-offset:1px; }
  button{
    cursor:pointer;
    font-family:inherit;
  }
  .btn-primary{
    background:var(--cyan);
    color:#04121a;
    border:none;
    border-radius:8px;
    padding:10px 16px;
    font-size:14px;
    font-weight:600;
  }
  .btn-primary:hover{ filter:brightness(1.08); }
  .btn-primary:disabled{ opacity:0.5; cursor:not-allowed; }
  .btn-secondary{
    background:transparent;
    color:var(--text);
    border:1px solid var(--border);
    border-radius:8px;
    padding:8px 14px;
    font-size:13px;
  }
  .btn-secondary:hover{ border-color:var(--cyan); color:var(--cyan); }
  #login-error{
    color:var(--danger);
    font-size:13px;
    text-align:center;
    min-height:16px;
  }
  /* ---------- APP SHELL ---------- */
  #app{ display:none; min-height:100vh; flex-direction:column; }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 20px;
    border-bottom:1px solid var(--border);
    background:var(--navy-2);
  }
  .header-left{ display:flex; align-items:center; gap:14px; }
  .header-logo-wrap{
    background:#fff;
    border-radius:6px;
    padding:4px 10px;
    display:flex;
    align-items:center;
  }
  .header-logo-wrap img{ height:22px; display:block; }
  header h2{ margin:0; font-size:15px; font-weight:600; color:var(--text); }
  .header-right{ display:flex; align-items:center; gap:12px; }
  .user-chip{ font-size:13px; color:var(--text-dim); }

  main{ flex:1; padding:24px; max-width:1100px; margin:0 auto; width:100%; }

  .steps{
    display:flex;
    gap:8px;
    margin-bottom:24px;
    flex-wrap:wrap;
  }
  .step-pill{
    padding:6px 14px;
    border-radius:999px;
    font-size:12.5px;
    border:1px solid var(--border);
    color:var(--text-dim);
  }
  .step-pill.active{
    border-color:var(--cyan);
    color:var(--cyan);
    background:var(--cyan-dim);
  }
  .step-pill.done{
    border-color:var(--ok);
    color:var(--ok);
  }

  .card{
    background:var(--navy-2);
    border:1px solid var(--border);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
  }
  .card h3{ margin:0 0 14px 0; font-size:14px; color:var(--text); }
  .card p.hint{ color:var(--text-dim); font-size:12.5px; margin:6px 0 0 0; }

  .row{ display:flex; gap:12px; flex-wrap:wrap; }
  .field{ display:flex; flex-direction:column; gap:6px; min-width:220px; flex:1; }
  .field label{ font-size:12px; color:var(--text-dim); }
  select{
    background:var(--navy-3);
    border:1px solid var(--border);
    border-radius:8px;
    padding:10px 12px;
    color:var(--text);
    font-size:14px;
  }

  table{ width:100%; border-collapse:collapse; margin-top:10px; }
  th{
    text-align:left;
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.03em;
    color:var(--text-dim);
    padding:8px 10px;
    border-bottom:1px solid var(--border);
  }
  td{
    padding:8px 10px;
    border-bottom:1px solid var(--border);
    font-size:13.5px;
  }
  td.qty-cell input{ width:70px; padding:6px 8px; }
  tr:hover td{ background:#ffffff06; }

  .empty-state{
    text-align:center;
    color:var(--text-dim);
    padding:40px 20px;
    font-size:13.5px;
  }

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:16px;
  }

  .badge{
    font-size:11px;
    padding:2px 8px;
    border-radius:999px;
    background:var(--cyan-dim);
    color:var(--cyan);
  }

  .toast{
    position:fixed;
    bottom:20px;
    right:20px;
    background:var(--navy-3);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 18px;
    font-size:13.5px;
    display:none;
    z-index:100;
  }
  .toast.show{ display:block; }
  .toast.error{ border-color:var(--danger); color:var(--danger); }
  .toast.success{ border-color:var(--ok); color:var(--ok); }

  /* ---------- NUOVO LAYOUT COMPATTO ---------- */
  .card.compact{ padding:16px 20px; margin-bottom:14px; }
  .card.compact h3{ margin-bottom:10px; }
  .field-sm{ min-width:150px; }

  .dropdown-results{
    position:absolute;
    top:100%;
    left:0;
    right:0;
    margin-top:4px;
    background:var(--navy-3);
    border:1px solid var(--border);
    border-radius:8px;
    max-height:220px;
    overflow-y:auto;
    z-index:20;
    display:none;
  }
  .dropdown-results.show{ display:block; }
  .dropdown-item{
    padding:8px 12px;
    font-size:13px;
    cursor:pointer;
    border-bottom:1px solid var(--border);
  }
  .dropdown-item:last-child{ border-bottom:none; }
  .dropdown-item:hover{ background:#ffffff08; }
  .dropdown-item .sub{ color:var(--text-dim); font-size:11.5px; }
  .dropdown-empty{ padding:10px 12px; font-size:12.5px; color:var(--text-dim); }

  .chip{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:var(--cyan-dim);
    color:var(--cyan);
    border-radius:8px;
    padding:8px 12px;
    font-size:13px;
  }
  .chip .chip-x{ cursor:pointer; opacity:0.7; }
  .chip .chip-x:hover{ opacity:1; }

  .send-bar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    background:var(--navy-2);
    border:1px solid var(--border);
    border-radius:10px;
    padding:10px 16px;
    margin-bottom:14px;
  }
  .btn-sm{ padding:7px 14px; font-size:13px; }

  .pagination{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    margin-top:14px;
    font-size:13px;
    color:var(--text-dim);
  }

  .hint-inline{ font-size:11.5px; color:var(--text-dim); margin-top:6px; }
</style>
</head>

/* =====================================================================

let state = {

// Escape testo prima di inserirlo via innerHTML (protezione XSS su dati che arrivano da RPN)
function escapeHtml(str){
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* =====================================================================
   AUTH
   ===================================================================== */
async function checkSession(){
  const { data } = await sb.auth.getSession();
  if (data.session) {
    showApp(data.session.user);
  } else {
    showLogin();
  }
}

function showLogin(){
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

function showApp(user){
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-chip').textContent = user.email || '';
  initApp();
}

document.getElementById('login-btn').addEventListener('click', async () => {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  errEl.textContent = '';
  if (!email || !password) {
    errEl.textContent = 'Inserisci email e password.';
    return;
  }
  let result;
  try {
    result = await sb.auth.signInWithPassword({ email, password });
  } catch (networkErr) {
    errEl.textContent = 'Errore di rete/connessione a Supabase: ' + networkErr.message;
    console.error('Supabase network error:', networkErr);
    return;
  }
  const { data, error } = result;
  if (error) {
    errEl.textContent = 'Errore Supabase: ' + error.message;
    console.error('Supabase auth error:', error);
    return;
  }
  showApp(data.user);
});

// Logout locale (NON sb.auth.signOut(), per non disconnettere le altre app PDE
// che condividono lo stesso progetto Supabase).
document.getElementById('logout-btn').addEventListener('click', () => {
  Object.keys(localStorage)
    .filter(k => k.startsWith('sb-'))
    .forEach(k => localStorage.removeItem(k));
  location.reload();
});

  document.getElementById('input-ean-search').addEventListener('input', debounce(onEanSearchInput, 300));
  document.getElementById('input-libreria-search').addEventListener('input', debounce(onLibreriaSearch, 350));
  document.getElementById('libreria-clear').addEventListener('click', clearLibreria);
  document.getElementById('invia-btn').addEventListener('click', inviaPrenotazione);
  document.getElementById('prev-page').addEventListener('click', () => changePage(-1));
  document.getElementById('next-page').addEventListener('click', () => changePage(1));
}

/* =====================================================================
   CEDOLA — Giro / Cedola del Giro / Cedola Extra / filtro Editore / EAN

   GET `${RPN_PROXY_BASE}/cedola-extra-list`

async function loadGiroCedolaList(){
  try {
    // --- MOCK temporaneo, struttura presa dalla risposta reale di RPN ---
    // Il campo "editori" è un'aggiunta lato Prenota (non esiste su RPN così)
    // per poter filtrare le cedole per editore: da popolare lato Edge Function
    // incrociando i titoli di ogni cedola con il loro editore.
    state.giroList = [

        { id: 2912, nome: "GIRO 4 2026 B", editori: ["HARPERCOLLINS ITALIA"] },
        { id: 2913, nome: "GIRO 4 2026 C", editori: ["RAFFAELLO CORTINA EDITORE"] },
        { id: 2914, nome: "GIRO 4 2026 KIDS", editori: ["HARPERCOLLINS ITALIA"] },
        { id: 2915, nome: "GIRO 4 2026 SERVICE", editori: [] },
      ]},

    ];
    // --- fine mock ---
    renderGiroSelect();
  } catch (e) {

async function loadCedolaExtraList(){
  try {
    // --- MOCK temporaneo ---
    state.cedolaExtraList = [
      { id: 5001, nome: "EXTRA NATALE 2026", editori: ["ADELPHI EDIZIONI"] },
      { id: 5002, nome: "EXTRA SCUOLA 2026", editori: ["RAFFAELLO CORTINA EDITORE"] },
    ];
    // --- fine mock ---
    renderCedolaExtraSelect();
  } catch (e) {
    showToast('Errore nel caricamento delle cedole extra', true);
  }
}

function renderGiroSelect(){
  const sel = document.getElementById('select-giro');
  sel.innerHTML = '<option value="">Seleziona un Giro...</option>' +
    state.giroList.map(g => `<option value="${g.id}">${escapeHtml(g.nome)}</option>`).join('');
}

function renderCedolaExtraSelect(){
  const sel = document.getElementById('select-cedola-extra');
  const filtered = state.cedolaExtraList.filter(matchesEditoreFilter);
  sel.innerHTML = '<option value="">Nessuna</option>' +
    filtered.map(c => `<option value="${c.id}">${escapeHtml(c.nome)}</option>`).join('');
}

function matchesEditoreFilter(cedola){
  if (!state.editoreFilter) return true;
  const f = state.editoreFilter.toLowerCase();
  return (cedola.editori || []).some(ed => ed.toLowerCase().includes(f));
}

function onGiroChange(e){
  state.selectedGiroId = e.target.value;
  renderCedolaSelectForGiro();
}

function renderCedolaSelectForGiro(){
  const cedolaSel = document.getElementById('select-cedola');
  const giro = state.giroList.find(g => String(g.id) === String(state.selectedGiroId));
  if (!giro || !giro.cedolaSet.length) {
    cedolaSel.innerHTML = '<option value="">Nessuna cedola disponibile</option>';
    cedolaSel.disabled = true;
    return;
  }
  const filtered = giro.cedolaSet.filter(matchesEditoreFilter);
  cedolaSel.disabled = false;
  cedolaSel.innerHTML = '<option value="">Seleziona una Cedola...</option>' +
    filtered.map(c => `<option value="${c.id}">${escapeHtml(c.nome)}</option>`).join('');
}

function onCedolaChange(e){
  state.selectedCedolaId = e.target.value;
  if (!state.selectedCedolaId) return;
  // Una prenotazione è su UNA cedola: deseleziono l'eventuale cedola extra
  state.selectedCedolaExtraId = null;
  document.getElementById('select-cedola-extra').value = '';
  onCedolaSelected();
}

function onCedolaExtraChange(e){
  state.selectedCedolaExtraId = e.target.value;
  if (!state.selectedCedolaExtraId) return;
  // Idem al contrario
  state.selectedCedolaId = null;
  document.getElementById('select-giro').value = '';
  document.getElementById('select-cedola').innerHTML = '<option value="">Seleziona prima il Giro</option>';
  document.getElementById('select-cedola').disabled = true;
  onCedolaSelected();
}

function onCedolaSelected(){
  document.getElementById('input-libreria-search').disabled = false;
  if (state.selectedLibreria) loadTitoli();
}

function getActiveCedolaId(){
  return state.selectedCedolaId || state.selectedCedolaExtraId || null;
}

function onEditoreFilterInput(e){
  state.editoreFilter = e.target.value.trim();
  renderCedolaSelectForGiro();
  renderCedolaExtraSelect();
}

/* =====================================================================
   RICERCA PER EAN — trova a quale/i cedole appartiene un EAN
   TODO: sostituire con la chiamata reale, es.
   GET `${RPN_PROXY_BASE}/ean-lookup/:ean`
   ===================================================================== */
const MOCK_EAN_INDEX = {
  "9788845941368": { giroId: 31, cedolaId: 2911, cedolaNome: "GIRO 4 2026 A" },
  "9791259856203": { giroId: 31, cedolaId: 2912, cedolaNome: "GIRO 4 2026 B" },
};

function onEanSearchInput(e){
  const ean = e.target.value.trim();
  const hint = document.getElementById('cedola-hint');
  if (ean.length < 13) {
    hint.textContent = 'Dati letti da RPN via Edge Function rpn-sync (da collegare — vedi TODO nel codice).';
    return;
  }
  const match = MOCK_EAN_INDEX[ean];
  if (!match) {
    hint.textContent = `Nessuna cedola trovata per l'EAN ${ean}.`;
    return;
  }
  document.getElementById('select-giro').value = match.giroId;
  state.selectedGiroId = String(match.giroId);
  renderCedolaSelectForGiro();
  document.getElementById('select-cedola').value = match.cedolaId;
  state.selectedCedolaId = String(match.cedolaId);
  state.selectedCedolaExtraId = null;
  document.getElementById('select-cedola-extra').value = '';
  hint.textContent = `EAN trovato in "${match.cedolaNome}" — cedola selezionata automaticamente.`;
  onCedolaSelected();
}

/* =====================================================================
   LIBRERIA — versione compatta con dropdown
   TODO: sostituire il mock con la chiamata reale:
   GET `${RPN_PROXY_BASE}/librerie?query=...`
   ===================================================================== */
async function onLibreriaSearch(e){
  const q = e.target.value.trim();
  const dropdown = document.getElementById('libreria-dropdown');
  if (q.length < 2) {
    dropdown.classList.remove('show');
    return;
  }
  try {
    // --- MOCK temporaneo ---
    const mockResults = [
      { id: 3, code: "21500", name: "HOEPLI SPA", city: "MILANO" },
      { id: 100, code: "100", name: "ARNOLDI SNC", city: "BERGAMO" },
    ].filter(r => r.name.toLowerCase().includes(q.toLowerCase()) || r.code.includes(q));
    // --- fine mock ---

    if (!mockResults.length) {
      dropdown.innerHTML = '<div class="dropdown-empty">Nessuna libreria trovata.</div>';
      dropdown.classList.add('show');
      return;
    }
    dropdown.innerHTML = mockResults.map(r => `
      <div class="dropdown-item" onclick="selectLibreria(${r.id}, '${escapeHtml(r.name).replace(/'/g, "\\'")}')">
        ${escapeHtml(r.name)}<br/><span class="sub">${escapeHtml(r.code)} · ${escapeHtml(r.city)}</span>
      </div>
    `).join('');
    dropdown.classList.add('show');
  } catch (err) {
    showToast('Errore nella ricerca librerie', true);
  }
}

async function selectLibreria(id, name){
  state.selectedLibreria = { id, name };
  document.getElementById('libreria-dropdown').classList.remove('show');
  document.getElementById('input-libreria-search').value = '';
  document.getElementById('libreria-selected-name').textContent = name;
  document.getElementById('libreria-selected-chip').style.display = 'inline-flex';
  if (getActiveCedolaId()) await loadTitoli();
}

function clearLibreria(){
  state.selectedLibreria = null;
  document.getElementById('libreria-selected-chip').style.display = 'none';
  document.getElementById('titoli-table').style.display = 'none';
  document.getElementById('titoli-pagination').style.display = 'none';
  document.getElementById('titoli-empty').style.display = 'block';
}

/* =====================================================================
   TITOLI della cedola — con paginazione (max 50 per pagina)
   TODO: sostituire il mock con la chiamata reale:
   GET `${RPN_PROXY_BASE}/titoli/${getActiveCedolaId()}?page=${state.currentPage}`
   ===================================================================== */
async function loadTitoli(){
  try {
    // --- MOCK temporaneo, struttura presa dalla risposta reale di RPN ---
    state.titoli = [
      { ean: "9788845941368", titolo: "LETTERE A VERA", autore: "NABOKOV VLADIMIR", editore: "ADELPHI EDIZIONI", prezzo: 24.00 },
      { ean: "9788845941382", titolo: "LA STRADA DI CAMPAGNA", autore: "ULLMANN REGINA", editore: "ADELPHI EDIZIONI", prezzo: 18.00 },
      { ean: "9788845941375", titolo: "I SONNAMBULI, III", autore: "BROCH HERMANN", editore: "ADELPHI EDIZIONI", prezzo: 25.00 },
    ];
    // --- fine mock ---
    state.currentPage = 1;
    renderTitoliPage();
  } catch (e) {
    showToast('Errore nel caricamento dei titoli', true);
  }
}

function renderTitoliPage(){
  const tbody = document.getElementById('titoli-tbody');
  const table = document.getElementById('titoli-table');
  const empty = document.getElementById('titoli-empty');
  const pagination = document.getElementById('titoli-pagination');

  if (!state.titoli.length) {
    empty.style.display = 'block';
    table.style.display = 'none';
    pagination.style.display = 'none';
    return;
  }
  empty.style.display = 'none';
  table.style.display = 'table';

  const totalPages = Math.max(1, Math.ceil(state.titoli.length / state.pageSize));
  state.currentPage = Math.min(Math.max(1, state.currentPage), totalPages);
  const start = (state.currentPage - 1) * state.pageSize;
  const pageItems = state.titoli.slice(start, start + state.pageSize);

  tbody.innerHTML = pageItems.map(t => `
    <tr>
      <td>${escapeHtml(t.ean)}</td>
      <td>${escapeHtml(t.titolo)}</td>
      <td>${escapeHtml(t.autore)}</td>
      <td>${escapeHtml(t.editore)}</td>
      <td>${t.prezzo.toFixed(2)} €</td>
      <td class="qty-cell"><input type="number" min="0" value="${state.quantita[t.ean] || 0}" data-ean="${escapeHtml(t.ean)}" onchange="onQtyChange(this)" /></td>
    </tr>
  `).join('');

  pagination.style.display = totalPages > 1 ? 'flex' : 'none';
  document.getElementById('page-indicator').textContent = `Pagina ${state.currentPage} di ${totalPages}`;
  document.getElementById('prev-page').disabled = state.currentPage <= 1;
  document.getElementById('next-page').disabled = state.currentPage >= totalPages;
}

function changePage(delta){
  state.currentPage += delta;
  renderTitoliPage();
}

function onQtyChange(input){
  const ean = input.dataset.ean;
  const qty = parseInt(input.value, 10) || 0;
  state.quantita[ean] = qty;
  updateRiepilogo();
}

function updateRiepilogo(){
  const nonZero = Object.values(state.quantita).filter(q => q > 0).length;
  document.getElementById('riepilogo-badge').textContent = `${nonZero} titoli con copie > 0`;
  document.getElementById('invia-btn').disabled = nonZero === 0;
}

/* =====================================================================
   UTIL
   ===================================================================== */
function showToast(msg, isError){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (isError ? 'error' : 'success');
  setTimeout(() => { t.className = 'toast'; }, 3500);
}

function debounce(fn, ms){
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), ms);
  };
}
